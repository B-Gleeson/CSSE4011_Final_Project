CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_ADC=y
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_CONSOLE=y

# GPIO placeholder for alarm buzzer
CONFIG_GPIO=y

# Bluetooth Peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="UV_ALARM_NODE"
CONFIG_BT_MAX_CONN=1

# Nordic UART Service
CONFIG_BT_ZEPHYR_NUS=y